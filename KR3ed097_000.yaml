front:
  text: 序刀圭之術上自岐黃下及歷代名師哲匠往往繼興方書論說紛紛乎不知幾數也後漢張仲景尤獨出群然其書傳者僅傷寒論金匱而已晉王叔和選次之增演其書加以私說於是篇中玉石混同而失真面目至千歲之後無知仲景心事者矣吾邦東洞翁憂其迂論臆說有害本文憤勵激發而作書著論以簸以揚秕糠悉去張氏之書得復其舊豈不精哉宜矣哉世之尊信翁也屬者書肆北林堂齎方機來曰此書也東洞翁口授而門人之所傳記以為帳祕也余得之於乾守業者欲刊以公於世願勞先生校訂余不敢辭事務之餘檢校數次遂於方名之下加其方以應其需云爾文化辛未歲二月殿經文緯撰
