味以水七升煮取四升分溫四服日三夜一服以水一合五勺煮取六勺咽中如有炙臠者兼用南呂按千金作胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下若感冒桂枝之證而有痰飲者桂枝湯合方主之屢所經驗也半夏乾薑散半夏乾薑各等分上二味杵為散取方寸匙漿水一升半一合二勺煎取七合六勺頓服之乾嘔不止者吐涎沫者兼用南呂乾薑人參半夏丸乾薑人參各一兩七分五釐半夏二兩一錢五分上三味末之以生薑汁糊為丸如梧子大飲服十丸日三服或三味水煎合生薑汁服妊娠嘔吐不止者心下痞硬而乾嘔不止者半夏瀉心湯半夏半升九分黃芩乾薑人參甘草各三兩大棗十二枚各四分五釐黃連一兩一分五釐上七味以水一斗煮取六升去滓再煮取三升溫服一升日三服以水二合煮取一合二勺去滓再煎取六勺心下痞硬腹中雷鳴者太簇嘔而腸鳴心下痞硬者太簇心中煩悸或怒或悲傷者紫丸若下利不止乾嘔心煩者甘草瀉心湯主之默默欲眠目不得閉起臥不安不欲飲食惡聞食臭者甘草瀉心湯主之於半夏瀉心湯方內加甘草一兩一分五釐若干噫食臭腹中雷鳴下利或嘔吐者生薑瀉心湯主之半夏瀉心湯方內減乾薑二兩加生薑四兩半夏九分甘草人參大棗黃芩各四分五釐黃連乾薑各一分五釐生薑六分上八味煮如半夏瀉心湯吳茱萸湯吳茱萸一升一錢八分人參三兩大棗十二枚各四分五釐生薑六兩九分上四味以水七升煮取二升去滓溫服七合日三服以水二合一勺煮取六勺食谷欲嘔者方意以氣逆為主證吐利吐瀉也手足厥冷煩躁者乾嘔吐涎沫頭痛者南呂嘔而胸滿者紫丸腳氣上攻而嘔者紫丸若水腫而嘔者非此湯之所知也厚朴生薑半夏甘草人參湯厚朴生薑各半斤一錢二分半夏半斤九分人參一兩一分五釐甘草二兩三分上五味以水一斗煮取三升去滓溫服一升日三服以水二合煮取六勺腹脹滿嘔逆者兼用消塊黃連湯黃連甘草乾薑桂枝各三兩大棗十二枚各四分五釐人參二兩三分半夏半升九分上七味以水一斗煮取六升去滓溫服一升日三服夜二服以水一合者取六勺胸中有熱腹中痛欲嘔吐者心煩嘔逆者以上兼用紫丸乾薑黃連黃芩人參湯乾薑黃連黃芩人參各三兩六分五釐上四味以水六升煮取二升去滓分溫再服以水一合八勺煮取六勺下利心煩食入口即吐者兼用紫丸下利心下痞硬幹嘔者兼用紫丸大建中湯蜀椒二合六分乾薑四兩一錢二分人參二兩六分上三味以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日飲糜溫覆之以水一合六勺煮取八勺去滓內膠飴煮取六勺心胸間痛嘔不能食者腹中寒上衝皮起出見有頭足上下痛而不可觸近者兼用紫丸黃連阿膠湯黃連四兩一錢二分黃芩一兩三分芍藥二兩六分雞子黃二枚一枚三分之一阿膠三兩九分上五味以水五升先煮三物取二升去滓內膠煬盡少冷內雞子黃攪令相得溫服七合日三服以水一合半煮三物取六勺去滓內膠煬盡少冷內雞子黃攪令相得心中煩而不能臥者胸中有熱心下痞煩而不能眠者黃芩湯黃芩三兩大棗十二枚各九分甘草芍藥各二兩六分上四味以水一斗煮取三升去滓溫服一升日再夜一服以水二合煮取六勺心下痞自下利者口苦咽燥目眩自下利者若嘔者黃芩加半夏生薑湯主之於本方內加半夏半升生薑三兩黃芩大棗生薑各四分五釐甘草芍藥各三分半夏九分上六味煮如本方六物黃芩湯黃芩人參乾薑各三兩大棗十二枚各四分五釐桂枝一兩一分五釐半夏半升九分上六味以水七升煮取三升分溫三服以水一合四勺煮取四勺乾嘔下利心下痞硬者痢疾心下痞硬而嘔不能食者兼用紫丸三物黃芩湯黃芩一兩四分苦參二兩八分乾地黃四兩一錢六分上三味以水六升煮取二升溫服一升多吐下蟲以水一合六勺煮取六勺四肢煩熱者兼用黃連解毒散白頭翁湯白頭翁黃連黃蘗秦皮各三兩各七分五釐上四味以水七升煮取二升去滓溫服一升不愈更服一升以水二合六勺煮取六勺熱利下重者下利欲飲水者胸中熱而心煩下利者以上兼用紫丸若心煩不得眠或煩躁者白頭翁加甘草阿膠湯主之於本方內加甘草阿膠各二兩上六味以水七升煮取二升半內膠令消盡分溫三服白頭翁黃連黃蘗秦皮各六分甘草阿膠各四分上六味以水一合七勺煮取六勺去滓內膠令消盡木防己湯木防己三兩六分石膏雞子大一錢六分桂枝二兩四分人參四兩八分上四味以水六升煮取二升分溫再服以水一合八勺煮取六勺喘滿心下痞堅者腫滿心下硬滿者短氣或逆滿而痛或渴者以上兼用蕤賓南呂劇者以紫丸攻之若喘滿止或不渴心下悸而痞堅難解者木防己去石膏加茯苓芒硝湯主之於木防己湯方內去石膏加茯苓四兩芒硝三合上五味以水六升煮取二升去滓內芒硝再微煎分溫再服微利則愈防己六分桂枝四分人參茯苓各八分芒硝一錢二分上五味以水一合八勺煮取六勺內芒硝令消盡防己茯苓湯防己黃蓍桂枝各三兩各六分茯苓六兩一錢二分甘草二兩四分上五味以水六升煮取二升分溫三服以水一合八勻煮取六勻四肢腫水氣在皮膚中肉瞤筋惕者桃花散防己黃蓍湯方從外臺防己四兩六分黃蓍五兩七分五釐朮生薑各三兩大棗十四枚各四分五釐甘草二兩三分上六味以水六升煮取二升分溫三服以水一合八勺煮取六勺水病脈浮身重汗出惡風者水病小便難腰以下腫或及陰難屈伸者仲呂枳實芍藥散枳實芍藥各等分上二味杵為散服方寸匙日三服並主癰膿以麥粥下之腹痛煩滿者夷則枳朮湯枳實七枚二錢二分術二兩六分上二味以