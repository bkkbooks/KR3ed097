body:
  text: 凡例一東洞翁所著方極大行於世然其文要簡不便於初學此編雖似蛇足然亦輯翁之所口授而坦易鄭重故欲為牖後進之一助也一分量古今不一且漢稱與本邦異故今就翁所考訂而別注於各方下如桂枝湯桂枝芍藥生薑各三兩大棗十二枚今各七分五釐甘草二兩今五分是也存其舊者以便覽者煮法亦然一各方後舉其所主治之病症而傍加兼用劑也如其藥方審於向所刊行古方丸散方故今不贅一凡欲就長沙方而施匙術者尤不可擇藥性不精嚴近世為醫者徒貪其價廉而不要擇藥唯利之趨往往欺人者多矣何其不仁之太甚也夫醫之治疾也猶勇士之使兵鉛刀鈍器雖當仇讎將安為用也故苟去其利而擇藥性能從古人之規矩則何病不治思諸思諸正文桂枝湯桂枝芍藥生薑各三兩大棗十二枚今用各七分五釐甘草二兩今用五分上五味㕮咀以水七升微火煮取三升去滓適寒溫服一升今以水一合四勺煮取六勺服服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗更服依前法又不汗後服小促其間半日許令三服盡若病重者一日一夜服周時觀之服一劑盡病症猶在者更作服若汗不出者乃服至二三劑頭痛發熱汗出惡風者正證也頭痛一證亦當投此方矣若因咳嗽嘔逆而頭痛者則非此湯之所治也惡寒鼻鳴乾嘔者外邪之候也此方主之脈浮弱或浮數而惡寒者雖不具證亦用此方浮數浮弱蓋桂枝湯之脈狀也汗吐下後更湊一證又發熱汗出而身疼痛者此方猶為可用若脈浮緊而疼痛者則非此湯之所治也發汗後疼痛甚脈沉遲或痹或四肢拘攣心下痞塞者桂枝加芍藥生薑人參湯主之於本方內加芍藥生薑各一兩人參三兩今用桂枝大棗人參各六分芍藥生薑各八分甘草四分以上六味煮如桂枝湯兼用太簇或應鐘上衝甚者桂枝加桂湯主之於桂枝湯方內加桂二兩桂枝一錢芍藥大棗生薑各六分甘草四分上五味煮如桂枝湯兼用應鐘若有拘急硬滿之證者則桂枝湯不宜與焉凡上衝者非上逆之謂氣從少腹上衝於胸是也煩脈浮數無硬滿狀者腹滿寒下脈浮或惡寒或腹時痛者桂枝加芍藥湯主之於本方內加芍藥三兩桂枝大棗生薑各六分芍藥一錢二分甘草四分上五味煮如本方寒下已止而大實痛者桂枝加芍藥大黃湯主之於前方內加大黃一兩今於前方內加大黃二分兼用應鐘散項背強汗出惡風者桂枝加葛根湯主之於本方內加葛根四兩桂枝芍藥大棗生薑各六分甘草四分葛根八分上六味煎如本方身體強脈沉遲者發熱汗出四肢拘急者或桂枝湯證而渴者栝蔞桂枝湯主之於本方內加栝蔞根二兩桂枝芍藥大棗生薑各六分栝蔞根甘草各四分上六味煮如本方黃汗四肢弛痛或身疼重煩躁小便不利者煩躁小便不利者立方證也身體疼重為主證也或盜汗出者發熱惡風而發黃色者桂枝加黃蓍湯主之於本方內加黃蓍二兩桂枝芍藥大棗生薑各六分甘草黃蓍各四分上六味煮如本方發汗遂漏不止其人惡風小便難四肢發急難以屈伸者桂枝加附子湯主之於本方內加附子一枚桂枝芍藥大棗生薑各六分甘草四分附子三分上六味煮如本方胸滿無拘急之證者桂枝去芍藥湯主之於本方內去芍藥桂枝大棗生薑各九分甘草六分以上四味煮法如本方若有喘而胸滿或痛或脅下痞硬等證者非此湯之所知也喘家桂枝加厚朴杏子湯主之於本方內加厚朴二兩杏子五十個桂枝芍藥大棗生薑各六分甘草厚朴杏仁各四分上七味煮如本方若喘而身疼痛者非此湯之所主也胸中熱而吐涎沫或咳者兼用南呂桂枝去芍藥加皂莢湯主之於本方內去芍藥加皂莢二枚桂枝生薑大棗各七分五釐甘草皂莢各五分上五味煮法如本方若咳而腹中拘攣或咳逆倚息者非此湯之所治也驚狂兼用紫丸起臥不安者或火逆躁兼用紫丸胸腹動劇者及瘧疾而有上衝者兼用紫丸桂枝去芍藥加蜀漆龍骨牡蠣湯主之桂枝生薑蜀漆各三兩大棗十二枚今各四分五釐牡蠣五兩九分五釐龍骨四兩六分甘草二兩三分上為末以水一斗二升先煮蜀漆減二升內諸藥煮取三升去滓溫服一升今以水二合四勺煮取七勺若有胸脅苦滿之症則別有主治矣頭項強痛發熱無汗心下滿微痛兼用南呂小便不利者桂枝去桂加朮苓湯主之於桂枝湯方內去桂加苓術各三兩芍藥大棗生薑茯苓朮各六分甘草四分上六味煮法如桂枝湯失精胸腹有動者兼用應鐘桂枝加龍骨牡蠣湯主之於本方內加龍骨牡蠣各三兩桂枝芍藥大棗生薑龍骨牡蠣各四分五釐甘草三分上七味煮如本方外感之證咽痛者或咽喉中生瘡或腫痛兼用應鐘劇者以梅肉攻之者桂枝加桔梗湯主之於本方內加桔梗八分煮法如本方濕家骨節疼痛兼用應鐘七寶者或半身不遂口眼喎斜南呂或紫丸者或頭疼重應鐘者或身體麻痹者或頭痛劇者應鐘時時以七寶紫丸之類攻之桂枝加朮附湯主之桂枝芍藥大棗生薑術各六分附子甘草各四分上七味煮如本方濕家眼目不明者應鐘或紫丸或七寶或耳聾或肉瞤筋惕者桂枝加苓朮附湯主之於前方內加茯苓六分經按以上二方皆從桂枝去桂加朮苓湯變來者也驗之奏效甚多桂枝附子湯桂枝四兩今八分附子三枚九分甘草二兩四分生薑三兩大棗十二枚各六分上五味以水六升煮取二升去滓分溫三服今以水一合八勺煮取六勺身體疼煩不能自轉側者應鐘或七寶若其人大便硬應鐘小便自利無沖逆者桂枝附子去桂加朮湯主之於桂枝附子湯方內去桂加朮四兩附子九分術八分甘草四分大棗生薑各六分上五味煮法如桂枝附子湯上五味以水三升煮取一升去滓分溫三服一服覺身痹半日許再服三服都盡其人如冒狀勿怪即是朮附走皮中逐水氣未得除故耳桂薑棗草黃辛附湯桂枝生薑各三兩大棗十二枚各六分甘草麻黃細辛各二兩各四分附子一枚三分上七味以水七升煮麻黃去上沫內諸藥煮取二升分溫三服當汗出如蟲行皮中即愈以水一合四勺煮取六勺惡寒或身體不仁或手足逆冷而心下堅者紫丸南呂及有痰飲之變者四肢惰痛惡寒甚者世俗所謂勞咳脊骨之灸骨蒸惡熱惡寒心中鬱郁或心下痞堅者南呂無痞堅者解毒散俱以紫丸時時攻之小建中湯桂枝甘草生薑各三兩大棗十二枚各四分五釐芍藥六兩九分膠飴一升三錢上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服以水一合五勺煮取六勺去滓內膠飴冷消腹中急痛應鐘或拘攣者此其正證也若有外閉之證則非此湯之所主治也衄解毒失精下血應鐘之人腹中攣急或痛手足煩熱者産婦手足煩熱咽乾口燥腹中拘攣者應鐘若有塊者夷則心悸或肉瞤筋惕或頭眩者應鐘心悸甚者解毒茯苓建中湯主之於本方內加茯苓四分五釐煮法如本方盜汗或汗出多或身重或不仁者黃蓍建中湯主之兼用應鐘於小建中湯方內加黃蓍一兩半今二分三釐桂枝甘草附子湯甘草術各二兩六分附子二枚九分桂枝四兩一錢二分上四味以水六升煮取三升去滓溫服一升日三服初服得微汗則解能食汗出復煩者服五合恐一升多者服六七合以水一合二勺煮取六勺服骨節煩疼掣痛不得屈伸近之則痛劇者紫丸或七寶桂枝人參湯桂枝甘草各四兩八分術人象乾薑各三兩六分上五味以水九升先煮四味取五升內桂更煮取二升溫服一升日再夜一服以水一合八勺煮取六勺服表裡有熱下利心下痞硬太簇者痢病發熱惡寒心下痞硬紫丸者人參湯人參甘草朮乾薑各三兩各七分五釐上四味搗篩為末蜜和丸如雞黃大以沸湯數合和一丸研碎溫服之日三服夜二服腹中未熱益至三四丸然不及湯湯法以四物依兩數切用水八升煮取三升去滓溫服一升日三服以水一合六勺煮取六勺服心下痞硬太簇者心下痞喜唾不了了者南呂暑病所謂霍亂嘔吐下利心下痞硬者紫丸茯苓杏仁甘草湯茯苓三兩一錢五分杏仁五十個一錢甘草一兩五分上三味以水一斗煮取五升溫服一升日三服不差者更服以水一合二勺煮取六勺短氣息迫或喘急紫丸者酒客最多此病以此湯大有效苓桂朮甘湯茯苓四兩一錢二分桂枝三兩九分朮甘草各二兩各六分上四味以水六升煮取三升去滓分溫三服以水一合二勺煮取六勺心下逆滿起則頭眩應鐘或紫丸者眼痛生赤脈不能開者應鐘或紫丸耳聾沖逆甚頭眩者應鐘及七寶苓薑朮甘湯甘草術各二兩五分乾薑茯苓各四兩一錢上四味以水五升煮取三升分溫三服以水一合二勺煮取六勺身體重腰冷小便自利者應鐘苓桂五味甘草湯茯苓桂枝各四兩八分甘草三兩六分五味子半升一錢二分上四味以水八升煮取三升去滓分溫三服以水一合六勺煮取六勺咳後沖逆劇手足厥冷或心下悸或頭眩或肉瞤筋惕者以上諸症皆兼用南呂丸若沖逆已愈但咳滿者芩甘五味姜辛湯主之於前方內去桂加茯苓四兩六分乾薑細辛各三兩四分五釐苓甘姜味辛夏湯茯苓四兩九分甘草細辛乾薑各三兩各三分五味子半夏各半升各九分上六味以水八升煮取三升去滓溫服半升日三服以水一合六勺煮取六勺前方證而嘔者芩甘姜味辛夏仁湯於前方內加杏仁半升九分前方證而微浮腫南呂者苓甘姜味辛夏仁黃湯於前方內加大黃三兩三分前方證而大便不通者苓桂甘棗湯茯苓半斤一錢二分甘草三兩四分五釐大棗十五枚五分五釐桂枝四兩六分上四味以水一斗先煮茯苓減二升內諸藥煮取三升去滓溫服一升日三服以水二合煮取六勺臍下悸者奔豚迫於心胸短氣息迫紫丸者茯苓澤瀉湯茯苓半斤一錢二分澤瀉生薑各四兩各六分甘草桂枝各二兩各三分術三兩四分五釐上六味以水一斗煮取三升內澤瀉更煮取二升半溫服八合日三服以水二合五勺先煮五味取八勺內澤瀉更煮取六勺吐而渴欲飲水者此正症也紫丸渴有水而渴也而小便不利心下悸或腹脹滿水滿也者蕤賓紫丸仲呂之類選用澤瀉湯澤瀉五兩二錢五分術二兩一錢上二味以水二升煮取一升分溫再服以水一合二勺煮取六勺心下有水氣苦胃眩小便不利者五苓散澤瀉一兩六銖半八分豬苓茯苓術各十八銖各六分桂枝半兩四分上五味為末以白飲和服方寸匕日三服多飲暖水汗出愈或以水一合五勺煮取六勺服亦可也大汗出而煩躁小便不利身熱消渴者正症也發汗而脈浮數煩渴者亦可用焉發熱而煩渴欲飲水水入口則吐者紫丸發熱小便數與發汗同意者或渴欲飲水者頭痛發熱汗出惡寒身疼痛而欲飲水者發熱嘔吐下利渴而欲飲水者紫丸心下悸吐涎沫頭眩者紫丸心下痞煩渴口燥小便不利黃鐘丸者若發黃色者茵陳五苓散主之兼用承氣丸茵陳蒿末十分五苓散五分上二物和先食飲方寸匕日三服豬苓湯豬苓茯苓阿膠滑石澤瀉各一兩六分上五味以水四升先煮四味取二升去滓內下阿膠煬消溫服七合日三服以水一合二勺煮取六勺內膠令消脈浮發熱渴欲飲水者此其正症也下利咳嘔渴而心煩不得眠者小便淋瀝或便膿血便者小便也者滑石礬甘散或應鐘牡蠣澤瀉散牡蠣澤瀉栝蔞根蜀漆葶藶商陸根海藻各等分上七味異搗下篩為散更入臼中治之白飲和服方寸匕小便利止後服日三服胸腹有動而渴腰以下水腫者蕤賓八味丸乾地黃八兩山茱萸薯蕷各四兩澤瀉茯苓牡丹皮